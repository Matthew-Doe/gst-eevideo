stages:
  - release

release:
  stage: release
  image: docker:29-cli  # Modern client (API 1.44+)
  services:
    - docker:29-dind  # Matching Docker-in-Docker service
  variables:
    GIT_DEPTH: 0  # Full history for accurate changelog generation
  rules:
    - if: $CI_COMMIT_TAG  # Only run on tags
  script: |
      # Authenticate to GitLab Container Registry
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

      # Run GoReleaser in its container
      docker run --rm --privileged \
        -v "$PWD":/go/src/gitlab.com/eevideo/eevid \
        -w /go/src/gitlab.com/eevideo/eevid \
        -v /var/run/docker.sock:/var/run/docker.sock \
        -e DOCKER_USERNAME="$CI_REGISTRY_USER" \
        -e DOCKER_PASSWORD="$CI_REGISTRY_PASSWORD" \
        -e DOCKER_REGISTRY="$CI_REGISTRY" \
        -e GITLAB_TOKEN="$GITLAB_TOKEN" \
        goreleaser/goreleaser:latest release --clean --skip=sbom
