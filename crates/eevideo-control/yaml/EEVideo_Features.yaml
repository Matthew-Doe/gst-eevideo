"0x001001":
  name: Identification Strings
  sname: id
  pointers:
    - index: 0
      name: Manufacturer Name
      registers:
        - offset: 0
          name: ManufacturerName
          acc: string
    - index: 1
      name: Device Model Name
      registers:
        - offset: 0
          name: DeviceModelName
          acc: string
    - index: 2
      name: Device Version
      registers:
        - offset: 0
          name: DeviceVersion
          acc: string
    - index: 3
      name: Serial Number
      registers:
        - offset: 0
          name: SerialNumber
          acc: string
    - index: 4
      name: Manufacturer Info
      registers:
        - offset: 0
          name: ManufacturerInfo
          acc: string
    - index: 5
      name: User Defined Name
      registers:
        - offset: 0
          name: UserDefinedName
          acc: string
    - index: 6
      name: Device Web Page
      registers:
        - offset: 0
          name: DeviceWebPage
          acc: string

"0x010001":
  name: Test Register Read/Write
  sname: test
  pointers:
    - index: 0
      name: Description
      registers:
        - offset: 0
          name: Description
          acc: string
    - index: 1
      name: Test Register
      registers:
        - offset: 0
          name: reg
          acc: rw
          fields:
            byte0:
              msb: 31
              len: 8
            byte1:
              msb: 23
              len: 8
            byte2:
              msb: 15
              len: 8
            byte3:
              msb: 7
              len: 8
            msb:
              msb: 31
              len: 1
            lsb:
              msb: 0
              len: 1

"0x101001":
  name: Ethernet Interface
  sname: eth
  pointers:
    - index: 0
      name: Description
      registers:
        - offset: 0
          name: Description
          acc: string
    - index: 1
      name: MAC Address
      registers:
        - offset: 0
          name: MacAddrMSBs
          acc: ro
          fields:
            macMsb:
              msb: 15
              len: 16
        - offset: 1
          name: MacAddrLSBs
          acc: ro
          fields:
            macLsb:
              msb: 31
              len: 32
    - index: 2
      name: IP Address
      registers:
        - offset: 0
          name: IPAddress
          acc: rw
          fields:
            curIP:
              msb: 31
              len: 32
    - index: 3
      name: Static IP Address
      registers:
        - offset: 0
          name: StaticIPAddress
          acc: ro
          fields:
            staticIP:
              msb: 31
              len: 32
    - index: 4
      name: Subnet Mask
      registers:
        - offset: 0
          name: SubnetMask
          acc: rw
          fields:
            mask:
              msb: 31
              len: 32
    - index: 5
      name: Static Subnet Mask
      registers:
        - offset: 0
          name: StaticSubnetMask
          acc: ro
          fields:
            staticIP:
              msb: 31
              len: 32
    - index: 6
      name: Gateway Addr
      registers:
        - offset: 0
          name: GatewayAddr
          acc: rw
          fields:
            gateway:
              msb: 31
              len: 32
    - index: 7
      name: Static Gateway Addr
      registers:
        - offset: 0
          name: StaticGatewayAddr
          acc: ro
          fields:
            staticIP:
              msb: 31
              len: 32

