              msb: 15
              len: 16
    - index: 6
      name: Source Port
      registers:
        - offset: 0
          name: SourcePort
          acc: rw
          fields:
            sPort:
              msb: 15
              len: 16
    - index: 7
      name: Pixels Per Line (Width)
      registers:
        - offset: 0
          name: PixelsPerLine
          acc: rw
          fields:
            ppl:
              msb: 15
              len: 16
    - index: 8
      name: Lines Per Frame (Height)
      registers:
