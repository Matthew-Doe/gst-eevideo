          name: LinesPerFrame
          acc: rw
          fields:
            lpf:
              msb: 15
              len: 16
    - index: 9
      name: Pixel Format
      registers:
        - offset: 0
          name: PixelFormat
          acc: rw
          fields:
            bpp:
              msb: 15
              len: 16
    - index: 10
      name: Acquisition Mode
      registers:
        - offset: 0
          name: AcquistionMode
          acc: rw
