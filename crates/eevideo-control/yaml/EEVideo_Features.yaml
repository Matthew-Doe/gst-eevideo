          name: MaxPacketSize
          acc: rw
          fields:
            fireTestPkt:
              msb: 31
              len: 1
            enable:
              msb: 16
              len: 1
            maxPkt:
              msb: 15
              len: 16
    - index: 2
      name: Delay
      registers:
        - offset: 0
          name: Delay
          acc: rw
          fields:
            delay:
              msb: 23
              len: 24
    - index: 3
      name: Dest MAC Addr
      registers:
        - offset: 0
          name: DestMacAddrMSBs
          acc: rw
          fields:
            destMacMs:
              msb: 15
              len: 16
        - offset: 1
          name: DestMacAddrLSBs
          acc: rw
          fields:
            destMacLs:
              msb: 31
              len: 32
    - index: 4
      name: Dest IP Addr
      registers:
