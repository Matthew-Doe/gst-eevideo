              msb: 3
              len: 4

"0x301001":
  name: I2C Controller
  sname: i2c
  pointers:
    - index: 0
      name: Description
      registers:
        - offset: 0
          name: Description
          acc: string
    - index: 1
      name: Reg Block
      registers:
        - offset: 0
          name: Status
          acc: ro
          fields:
            done:
              msb: 31
              len: 1
            holding:
              msb: 30
              len: 1
            rate:
              msb: 23
              len: 4
            maxlevel:
              msb: 19
              len: 4
            txlevel:
              msb: 15
              len: 8
            rxlevel:
              msb: 7
              len: 8
        - offset: 1
          name: Config
          acc: rw
          fields:
            reset:
              msb: 0
              len: 1
        - offset: 2
          name: TxFIFO
          acc: wo
          fields:
            stop:
              msb: 10
              len: 1
            hold:
              msb: 9
              len: 1
            ack:
              msb: 8
              len: 1
            data:
              msb: 7
              len: 8
        - offset: 3
          name: RxFIFO
          acc: rowc
          fields:
            ack:
              msb: 8
              len: 1
            data:
              msb: 7
              len: 8

"0x304001":
  name: MIPI Port
  sname: mipi
  pointers:
    - index: 0
      name: Description
      registers:
        - offset: 0
          name: Description
          acc: string
    - index: 1
      name: Monitor
      registers:
        - offset: 0
          name: Activity
          acc: ro
          fields:
            pcx16:
              msb: 31
              len: 16
            cactive:
              msb: 9
              len: 1
            ccont:
              msb: 8
              len: 1
            l0a:
              msb: 7
              len: 1
            l1a:
              msb: 6
              len: 1
            l2a:
              msb: 5
              len: 1
            l3a:
              msb: 4
              len: 1
            v0a:
              msb: 3
              len: 1
            v1a:
              msb: 2
              len: 1
            v2a:
              msb: 1
              len: 1
            v3a:
              msb: 0
              len: 1
        - offset: 1
          name: LineInfo
          acc: ro
          fields:
            pixelClockCount:
              msb: 31
              len: 16
            bytesPerLine:
              msb: 15
              len: 16
        - offset: 2
          name: LineCount
          acc: ro
          fields:
            lineCount:
              msb: 15
              len: 16
        - offset: 3
          name: DataType
          acc: rowc
          fields:
            dtype0:
              msb: 29
              len: 6
            dtype1:
              msb: 21
              len: 6
            dtype2:
              msb: 13
              len: 6
            dtype3:
              msb: 5
              len: 6
    - index: 2
      name: GPO
      registers:
        - offset: 0
          name: GPO
          acc: rw
          fields:
            bit3:
              msb: 3
              len: 1
            bit2:
              msb: 2
              len: 1
            bit1:
              msb: 1
              len: 1
            en:
              msb: 0
              len: 1
    - index: 3
      name: GPI
      registers:
        - offset: 0
          name: GPI
          acc: ro
          fields:
            bit3:
              msb: 3
              len: 1
            bit2:
              msb: 2
              len: 1
            bit1:
              msb: 1
              len: 1
            status:
              msb: 0
              len: 1

"0xFFF001":
  name: End of Features
  sname: eof
  pointers:
    - index: 0
      name: Last Static ROM Address
      registers:
        - offset: 0
          name: LastStaticROMAddress
    - index: 1
      name: First Register Address
      registers:
        - offset: 0
          name: FirstRegisterAddress
    - index: 2
      name: Last Register Address
      registers:
        - offset: 0
          name: LastRegisterAddress
      value: 0
